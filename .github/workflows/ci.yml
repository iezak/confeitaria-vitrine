name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            **/package-lock.json

      - name: Check project files
        id: files
        run: |
          if [ -f package.json ]; then
            echo "has_package_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package_json=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show skip reason
        if: steps.files.outputs.has_package_json == 'false'
        run: echo "Nenhum package.json encontrado ainda. O workflow foi configurado e ficará pronto para uso quando o projeto React for criado."

      - name: Install dependencies
        if: steps.files.outputs.has_package_json == 'true'
        run: npm ci

      - name: Build project
        if: steps.files.outputs.has_package_json == 'true'
        run: npm run build
